<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 560" role="img" aria-labelledby="title desc">
  <title id="title">Day 2 天津市区步行和相声地理示意线路图</title>
  <desc id="desc">市区相对位置示意：天津站与意风区在海河附近，五大道和桂园在更南偏西的位置，相声夜场按订票位置从晚餐后打车前往。</desc>
  <rect width="390" height="560" fill="#fffaf2"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ad4d35"/>
    </marker>
  </defs>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">
    <text x="24" y="42" fill="#ad4d35" font-size="22" font-weight="700">Day 2 市区核心向西南走</text>
    <text x="24" y="70" fill="#5d6b78" font-size="14">意风区在海河边，五大道/桂园在南偏西。</text>
    <g transform="translate(326 26)">
      <circle r="20" fill="#fff" stroke="#dfd6c6"/>
      <path d="M0 -13 L5 4 L0 1 L-5 4 Z" fill="#0e6b68"/>
      <text x="-5" y="-23" fill="#5d6b78" font-size="11">北</text>
    </g>
  </g>
  <path d="M236 96 C280 150 220 208 252 260 C278 304 222 356 238 430" fill="none" stroke="#8ec5cc" stroke-width="32" stroke-linecap="round" opacity=".42"/>
  <path d="M236 96 C280 150 220 208 252 260 C278 304 222 356 238 430" fill="none" stroke="#0e6b68" stroke-width="4" stroke-linecap="round" opacity=".62"/>
  <path d="M214 146 C246 166 258 184 270 210 C230 254 188 298 128 338 C116 372 114 392 124 412" fill="none" stroke="#ad4d35" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="12 9" marker-end="url(#arrow)"/>
  <path d="M124 412 C170 382 226 344 270 286" fill="none" stroke="#c58b28" stroke-width="5" stroke-linecap="round" stroke-dasharray="8 8"/>
  <path d="M124 412 C150 350 166 278 192 196" fill="none" stroke="#c58b28" stroke-width="5" stroke-linecap="round" stroke-dasharray="8 8"/>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15">
    <g transform="translate(214 146)">
      <circle r="18" fill="#0e6b68"/>
      <text x="-5" y="6" fill="#fff" font-weight="700">1</text>
      <rect x="-166" y="-34" width="136" height="66" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="-150" y="-11" fill="#16212f" font-weight="700">张记包子</text>
      <text x="-150" y="12" fill="#5d6b78" font-size="13">天津站周边</text>
    </g>
    <g transform="translate(270 210)">
      <circle r="18" fill="#ad4d35"/>
      <text x="-5" y="6" fill="#fff" font-weight="700">2</text>
      <rect x="-178" y="-34" width="148" height="66" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="-162" y="-11" fill="#16212f" font-weight="700">意风区/狗不理</text>
      <text x="-162" y="12" fill="#5d6b78" font-size="13">海河东岸附近</text>
    </g>
    <g transform="translate(128 338)">
      <circle r="18" fill="#0e6b68"/>
      <text x="-5" y="6" fill="#fff" font-weight="700">3</text>
      <rect x="30" y="-34" width="158" height="66" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="44" y="-11" fill="#16212f" font-weight="700">五大道/民园</text>
      <text x="44" y="12" fill="#5d6b78" font-size="13">午后向西南</text>
    </g>
    <g transform="translate(124 412)">
      <circle r="18" fill="#c58b28"/>
      <text x="-5" y="6" fill="#fff" font-weight="700">4</text>
      <rect x="30" y="-34" width="148" height="66" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="44" y="-11" fill="#16212f" font-weight="700">桂园餐厅</text>
      <text x="44" y="12" fill="#5d6b78" font-size="13">五大道晚饭</text>
    </g>
    <g transform="translate(270 286)">
      <circle r="16" fill="#ad4d35"/>
      <text x="-5" y="6" fill="#fff" font-weight="700">5</text>
      <rect x="-194" y="-34" width="164" height="66" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="-178" y="-11" fill="#16212f" font-weight="700">德云社方向</text>
      <text x="-178" y="12" fill="#5d6b78" font-size="13">按订票打车</text>
    </g>
    <g transform="translate(192 196)">
      <circle r="16" fill="#ad4d35"/>
      <text x="-5" y="6" fill="#fff" font-weight="700">5</text>
      <rect x="30" y="-34" width="132" height="66" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="44" y="-11" fill="#16212f" font-weight="700">古文化街</text>
      <text x="44" y="12" fill="#5d6b78" font-size="13">天津之眼一线</text>
    </g>
  </g>
  <path d="M24 508 H366" stroke="#dfd6c6"/>
  <text x="24" y="536" fill="#5d6b78" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="13">实线是白天主线；虚线是晚饭后按相声票位置二选一。</text>
</svg>
