<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 560" role="img" aria-labelledby="title desc">
  <title id="title">Day 2 天津站到滨海新区路线图</title>
  <desc id="desc">从天津站出发到国家海洋博物馆，再到泰达航母主题公园，小满海鲜晚餐后回到市区。</desc>
  <rect width="390" height="560" fill="#fffaf2"/>
  <rect x="22" y="96" width="346" height="382" rx="26" fill="#eef5f3" stroke="#dfd6c6"/>
  <path d="M78 138 C166 180 104 260 186 305 S290 372 128 438" fill="none" stroke="#0e6b68" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 10"/>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">
    <text x="24" y="42" fill="#ad4d35" font-size="22" font-weight="700">Day 2 滨海一整天</text>
    <text x="24" y="70" fill="#5d6b78" font-size="14">早出发，海博馆和航母放同一天。</text>
  </g>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15">
    <g transform="translate(78 138)">
      <circle r="19" fill="#0e6b68"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">1</text>
      <rect x="34" y="-28" width="180" height="58" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-5" fill="#16212f" font-weight="700">天津站</text>
      <text x="50" y="18" fill="#5d6b78" font-size="13">早出发去滨海</text>
    </g>
    <g transform="translate(150 218)">
      <circle r="19" fill="#ad4d35"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">2</text>
      <rect x="34" y="-28" width="190" height="58" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-5" fill="#16212f" font-weight="700">国家海洋博物馆</text>
      <text x="50" y="18" fill="#5d6b78" font-size="13">按预约时段入馆</text>
    </g>
    <g transform="translate(186 305)">
      <circle r="19" fill="#c58b28"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">3</text>
      <rect x="34" y="-28" width="185" height="58" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-5" fill="#16212f" font-weight="700">泰达航母乐园</text>
      <text x="50" y="18" fill="#5d6b78" font-size="13">下午看基辅号</text>
    </g>
    <g transform="translate(258 376)">
      <circle r="19" fill="#0e6b68"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">4</text>
      <rect x="-210" y="-28" width="186" height="58" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="-194" y="-5" fill="#16212f" font-weight="700">小满海鲜晚餐</text>
      <text x="-194" y="18" fill="#5d6b78" font-size="13">皮皮虾锅贴</text>
    </g>
    <g transform="translate(128 438)">
      <circle r="19" fill="#ad4d35"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">5</text>
      <rect x="34" y="-28" width="180" height="58" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-5" fill="#16212f" font-weight="700">回市区</text>
      <text x="50" y="18" fill="#5d6b78" font-size="13">相声或天津之眼</text>
    </g>
  </g>
  <path d="M24 508 H366" stroke="#dfd6c6"/>
  <text x="24" y="536" fill="#5d6b78" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="13">建议：滨海景点间打车更省力，回市区别排太满。</text>
</svg>
