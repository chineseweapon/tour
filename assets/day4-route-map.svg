<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 560" role="img" aria-labelledby="title desc">
  <title id="title">Day 4 滨海海博馆回市区再到天津南地理示意线路图</title>
  <desc id="desc">从滨海住宿到国家海洋博物馆，下午向西回天津市区吃罾蹦鲤鱼，晚上再向西南到天津南站附近酒店。</desc>
  <rect width="390" height="560" fill="#fffaf2"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ad4d35"/>
    </marker>
  </defs>
  <rect x="250" y="92" width="116" height="250" rx="24" fill="#d7e8ea" opacity=".68"/>
  <path d="M284 112 C314 164 278 226 310 306" fill="none" stroke="#0e6b68" stroke-width="4" stroke-linecap="round" opacity=".58"/>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">
    <text x="24" y="42" fill="#ad4d35" font-size="22" font-weight="700">Day 4 滨海回城，再去天津南</text>
    <text x="24" y="70" fill="#5d6b78" font-size="14">上午还在滨海；晚饭回市区；睡到天津南旁。</text>
    <g transform="translate(326 26)">
      <circle r="20" fill="#fff" stroke="#dfd6c6"/>
      <path d="M0 -13 L5 4 L0 1 L-5 4 Z" fill="#0e6b68"/>
      <text x="-5" y="-23" fill="#5d6b78" font-size="11">北</text>
    </g>
  </g>
  <path d="M300 150 C310 180 312 204 304 232 C268 278 206 310 142 344 C112 372 92 408 72 450" fill="none" stroke="#ad4d35" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="14 10" marker-end="url(#arrow)"/>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15">
    <g transform="translate(300 150)">
      <circle r="18" fill="#0e6b68"/>
      <text x="-5" y="6" fill="#fff" font-weight="700">1</text>
      <rect x="-212" y="-34" width="182" height="66" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="-196" y="-11" fill="#16212f" font-weight="700">滨海民宿</text>
      <text x="-196" y="12" fill="#5d6b78" font-size="13">早餐后出发</text>
    </g>
    <g transform="translate(304 232)">
      <circle r="18" fill="#ad4d35"/>
      <text x="-5" y="6" fill="#fff" font-weight="700">2</text>
      <rect x="-232" y="-40" width="202" height="78" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="-216" y="-16" fill="#16212f" font-weight="700">国家海洋博物馆</text>
      <text x="-216" y="8" fill="#5d6b78" font-size="13">预约入馆</text>
      <text x="-216" y="29" fill="#5d6b78" font-size="13">看郑和纯木质舰</text>
    </g>
    <g transform="translate(142 344)">
      <circle r="18" fill="#c58b28"/>
      <text x="-5" y="6" fill="#fff" font-weight="700">3</text>
      <rect x="30" y="-34" width="150" height="66" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="44" y="-11" fill="#16212f" font-weight="700">红旗饭庄</text>
      <text x="44" y="12" fill="#5d6b78" font-size="13">回市区吃鱼</text>
    </g>
    <g transform="translate(72 450)">
      <circle r="18" fill="#ad4d35"/>
      <text x="-5" y="6" fill="#fff" font-weight="700">4</text>
      <rect x="30" y="-40" width="210" height="78" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="44" y="-16" fill="#16212f" font-weight="700">天津南站酒店</text>
      <text x="44" y="8" fill="#5d6b78" font-size="13">市区西南侧</text>
      <text x="44" y="29" fill="#5d6b78" font-size="13">方便 Day 5 返程</text>
    </g>
  </g>
  <path d="M24 508 H366" stroke="#dfd6c6"/>
  <text x="24" y="536" fill="#5d6b78" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="13">示意重点：滨海在东，天津南在西南，晚饭后直接前置返程酒店。</text>
</svg>
