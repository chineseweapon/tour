<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 560" role="img" aria-labelledby="title desc">
  <title id="title">Day 4 国家海洋博物馆到市区晚餐和天津南站酒店路线图</title>
  <desc id="desc">上午从滨海民宿到国家海洋博物馆，下午亲友开车回天津市区，晚上吃罾蹦鲤鱼后入住天津南站鹏瑞利明宇丽雅酒店。</desc>
  <rect width="390" height="560" fill="#fffaf2"/>
  <path d="M72 136 C150 188 96 252 188 302 S266 382 126 440" fill="none" stroke="#8ec5cc" stroke-width="38" stroke-linecap="round" opacity=".48"/>
  <path d="M72 136 C150 188 96 252 188 302 S266 382 126 440" fill="none" stroke="#0e6b68" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 10"/>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">
    <text x="24" y="42" fill="#ad4d35" font-size="22" font-weight="700">Day 4 海博馆回市区</text>
    <text x="24" y="70" fill="#5d6b78" font-size="14">看郑和木舰模型，晚上吃罾蹦鲤鱼。</text>
  </g>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15">
    <g transform="translate(72 136)">
      <circle r="19" fill="#0e6b68"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">1</text>
      <rect x="34" y="-30" width="210" height="62" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-8" fill="#16212f" font-weight="700">滨海民宿</text>
      <text x="50" y="15" fill="#5d6b78" font-size="13">早餐后出发</text>
    </g>
    <g transform="translate(152 222)">
      <circle r="19" fill="#ad4d35"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">2</text>
      <rect x="34" y="-36" width="200" height="74" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-13" fill="#16212f" font-weight="700">国家海洋博物馆</text>
      <text x="50" y="10" fill="#5d6b78" font-size="13">提前预约</text>
      <text x="50" y="30" fill="#5d6b78" font-size="13">看郑和纯木质舰</text>
    </g>
    <g transform="translate(188 318)">
      <circle r="19" fill="#c58b28"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">3</text>
      <rect x="34" y="-30" width="150" height="62" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-8" fill="#16212f" font-weight="700">回天津市区</text>
      <text x="50" y="15" fill="#5d6b78" font-size="13">亲友开车接</text>
    </g>
    <g transform="translate(220 390)">
      <circle r="19" fill="#0e6b68"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">4</text>
      <rect x="-168" y="-30" width="144" height="62" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="-152" y="-8" fill="#16212f" font-weight="700">红旗饭庄</text>
      <text x="-152" y="15" fill="#5d6b78" font-size="13">罾蹦鲤鱼</text>
    </g>
    <g transform="translate(126 440)">
      <circle r="19" fill="#ad4d35"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">5</text>
      <rect x="34" y="-30" width="218" height="62" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-8" fill="#16212f" font-weight="700">天津南站酒店</text>
      <text x="50" y="15" fill="#5d6b78" font-size="13">鹏瑞利明宇丽雅</text>
    </g>
  </g>
  <path d="M24 508 H366" stroke="#dfd6c6"/>
  <text x="24" y="536" fill="#5d6b78" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="13">核心：晚饭后直接睡到天津南站旁边。</text>
</svg>
