<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 560" role="img" aria-labelledby="title desc">
  <title id="title">Day 1 天津西到利德顺和海河夜景路线图</title>
  <desc id="desc">18:30 到天津西，先到利德顺小老饭庄复兴路店晚餐，再入住市区酒店，步行到津湾广场和海河游船码头。</desc>
  <rect width="390" height="560" fill="#fffaf2"/>
  <path d="M70 128 C128 166 78 206 136 252 S250 334 154 430" fill="none" stroke="#8ec5cc" stroke-width="38" stroke-linecap="round" opacity=".46"/>
  <path d="M70 128 C128 166 78 206 136 252 S250 334 154 430" fill="none" stroke="#0e6b68" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 10"/>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">
    <text x="24" y="42" fill="#ad4d35" font-size="22" font-weight="700">Day 1 到站先吃饭</text>
    <text x="24" y="70" fill="#5d6b78" font-size="14">G680 18:30 到天津西，晚饭后看海河夜景。</text>
  </g>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15">
    <g transform="translate(70 128)">
      <circle r="19" fill="#0e6b68"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">1</text>
      <rect x="34" y="-30" width="245" height="62" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-8" fill="#16212f" font-weight="700">天津西站</text>
      <text x="50" y="15" fill="#5d6b78" font-size="13">18:30 下车，打车约 1.2km</text>
    </g>
    <g transform="translate(136 206)">
      <circle r="19" fill="#ad4d35"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">2</text>
      <rect x="34" y="-30" width="220" height="62" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-8" fill="#16212f" font-weight="700">利德顺小老饭庄</text>
      <text x="50" y="15" fill="#5d6b78" font-size="13">复兴路店，先吃晚饭</text>
    </g>
    <g transform="translate(96 286)">
      <circle r="19" fill="#c58b28"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">3</text>
      <rect x="34" y="-30" width="235" height="62" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-8" fill="#16212f" font-weight="700">市区酒店</text>
      <text x="50" y="15" fill="#5d6b78" font-size="13">天津站/津湾附近入住</text>
    </g>
    <g transform="translate(196 358)">
      <circle r="19" fill="#0e6b68"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">4</text>
      <rect x="-160" y="-30" width="136" height="62" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="-144" y="-8" fill="#16212f" font-weight="700">津湾广场</text>
      <text x="-144" y="15" fill="#5d6b78" font-size="13">解放桥灯光</text>
    </g>
    <g transform="translate(154 430)">
      <circle r="19" fill="#ad4d35"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">5</text>
      <rect x="34" y="-30" width="190" height="62" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-8" fill="#16212f" font-weight="700">海河游船码头</text>
      <text x="50" y="15" fill="#5d6b78" font-size="13">可坐船，也可散步</text>
    </g>
  </g>
  <path d="M24 508 H366" stroke="#dfd6c6"/>
  <text x="24" y="536" fill="#5d6b78" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="13">核心：别先折返酒店，先把第一顿天津菜吃掉。</text>
</svg>
