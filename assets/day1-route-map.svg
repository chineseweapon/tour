<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 560" role="img" aria-labelledby="title desc">
  <title id="title">Day 1 天津站到海河夜游路线图</title>
  <desc id="desc">天津站和酒店出发，依次经过津湾广场、解放桥、世纪钟、意大利风情街，最后到海河游船码头。</desc>
  <rect width="390" height="560" fill="#fffaf2"/>
  <path d="M80 132 C146 176 73 238 149 285 S246 345 176 418" fill="none" stroke="#8ec5cc" stroke-width="38" stroke-linecap="round" opacity=".55"/>
  <path d="M80 132 C146 176 73 238 149 285 S246 345 176 418" fill="none" stroke="#0e6b68" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 10"/>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">
    <text x="24" y="42" fill="#ad4d35" font-size="22" font-weight="700">Day 1 市区夜景线</text>
    <text x="24" y="70" fill="#5d6b78" font-size="14">天津站落地，步行串起海河两岸。</text>
  </g>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15">
    <g transform="translate(80 132)">
      <circle r="19" fill="#0e6b68"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">1</text>
      <rect x="34" y="-28" width="210" height="58" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-5" fill="#16212f" font-weight="700">天津站/酒店</text>
      <text x="50" y="18" fill="#5d6b78" font-size="13">凌晨到站，补觉后出门</text>
    </g>
    <g transform="translate(132 205)">
      <circle r="19" fill="#ad4d35"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">2</text>
      <rect x="34" y="-28" width="180" height="58" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-5" fill="#16212f" font-weight="700">津湾广场</text>
      <text x="50" y="18" fill="#5d6b78" font-size="13">黄昏拍海河</text>
    </g>
    <g transform="translate(86 278)">
      <circle r="19" fill="#c58b28"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">3</text>
      <rect x="34" y="-28" width="190" height="58" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-5" fill="#16212f" font-weight="700">解放桥/世纪钟</text>
      <text x="50" y="18" fill="#5d6b78" font-size="13">天津站出站名片</text>
    </g>
    <g transform="translate(170 352)">
      <circle r="19" fill="#0e6b68"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">4</text>
      <rect x="34" y="-28" width="185" height="58" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-5" fill="#16212f" font-weight="700">意大利风情街</text>
      <text x="50" y="18" fill="#5d6b78" font-size="13">晚餐或散步</text>
    </g>
    <g transform="translate(176 418)">
      <circle r="19" fill="#ad4d35"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">5</text>
      <rect x="34" y="-28" width="178" height="58" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-5" fill="#16212f" font-weight="700">海河游船码头</text>
      <text x="50" y="18" fill="#5d6b78" font-size="13">19:30 后夜景更稳</text>
    </g>
  </g>
  <path d="M24 496 H366" stroke="#dfd6c6"/>
  <text x="24" y="526" fill="#5d6b78" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="13">相声替换：买到夜场票，就压缩意风区散步。</text>
</svg>
