<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 560" role="img" aria-labelledby="title desc">
  <title id="title">Day 5 天津南站到合肥南站返程路线图</title>
  <desc id="desc">从天津南站鹏瑞利明宇丽雅酒店退房，步行或短途接驳到天津南站，选择七点二十九或九点三十三出发回合肥南站。</desc>
  <rect width="390" height="560" fill="#fffaf2"/>
  <path d="M78 142 C126 212 250 198 270 286 S220 388 120 430" fill="none" stroke="#d7b77c" stroke-width="38" stroke-linecap="round" opacity=".48"/>
  <path d="M78 142 C126 212 250 198 270 286 S220 388 120 430" fill="none" stroke="#0e6b68" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 10"/>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">
    <text x="24" y="42" fill="#ad4d35" font-size="22" font-weight="700">Day 5 天津南返程</text>
    <text x="24" y="70" fill="#5d6b78" font-size="14">住在车站旁，早上直接上高铁回合肥南。</text>
  </g>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15">
    <g transform="translate(78 142)">
      <circle r="19" fill="#0e6b68"/>
