      <rect x="34" y="-36" width="216" height="74" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-13" fill="#16212f" font-weight="700">鹏瑞利明宇丽雅</text>
      <text x="50" y="10" fill="#5d6b78" font-size="13">退房后去天津南</text>
      <text x="50" y="30" fill="#5d6b78" font-size="13">步行或短途接驳</text>
    </g>
    <g transform="translate(270 286)">
      <circle r="19" fill="#ad4d35"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">2</text>
      <rect x="-200" y="-36" width="176" height="74" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="-184" y="-13" fill="#16212f" font-weight="700">天津南站</text>
      <text x="-184" y="10" fill="#5d6b78" font-size="13">G87 07:29</text>
      <text x="-184" y="30" fill="#5d6b78" font-size="13">G981 09:33</text>
