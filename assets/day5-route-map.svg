<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 560" role="img" aria-labelledby="title desc">
  <title id="title">Day 5 天津南站到合肥南站返程地理示意线路图</title>
  <desc id="desc">从天津南站附近酒店短途到天津南站，再乘高铁向南返回合肥南站。</desc>
  <rect width="390" height="560" fill="#fffaf2"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ad4d35"/>
    </marker>
  </defs>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">
    <text x="24" y="42" fill="#ad4d35" font-size="22" font-weight="700">Day 5 天津南向南返程</text>
    <text x="24" y="70" fill="#5d6b78" font-size="14">酒店贴近天津南站，早上少横穿市区。</text>
    <g transform="translate(326 26)">
      <circle r="20" fill="#fff" stroke="#dfd6c6"/>
      <path d="M0 -13 L5 4 L0 1 L-5 4 Z" fill="#0e6b68"/>
      <text x="-5" y="-23" fill="#5d6b78" font-size="11">北</text>
    </g>
  </g>
  <path d="M196 150 L226 204" fill="none" stroke="#ad4d35" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M226 204 C205 278 162 346 112 430" fill="none" stroke="#ad4d35" stroke-width="8" stroke-linecap="round" stroke-dasharray="14 10" marker-end="url(#arrow)"/>
  <path d="M238 250 C246 292 228 350 194 404" fill="none" stroke="#d7b77c" stroke-width="34" stroke-linecap="round" opacity=".34"/>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15">
    <g transform="translate(196 150)">
      <circle r="18" fill="#0e6b68"/>
      <text x="-5" y="6" fill="#fff" font-weight="700">1</text>
      <rect x="-164" y="-40" width="134" height="78" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="-148" y="-16" fill="#16212f" font-weight="700">南站酒店</text>
      <text x="-148" y="8" fill="#5d6b78" font-size="13">退房</text>
      <text x="-148" y="29" fill="#5d6b78" font-size="13">短途接驳</text>
    </g>
    <g transform="translate(226 204)">
      <circle r="18" fill="#ad4d35"/>
      <text x="-5" y="6" fill="#fff" font-weight="700">2</text>
      <rect x="30" y="-40" width="134" height="78" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="44" y="-16" fill="#16212f" font-weight="700">天津南站</text>
      <text x="44" y="8" fill="#5d6b78" font-size="13">G87 07:29</text>
      <text x="44" y="29" fill="#5d6b78" font-size="13">G981 09:33</text>
    </g>
    <g transform="translate(112 430)">
      <circle r="18" fill="#c58b28"/>
      <text x="-5" y="6" fill="#fff" font-weight="700">3</text>
      <rect x="30" y="-40" width="204" height="78" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="44" y="-16" fill="#16212f" font-weight="700">合肥南站</text>
      <text x="44" y="8" fill="#5d6b78" font-size="13">G87 约 10:54 到</text>
      <text x="44" y="29" fill="#5d6b78" font-size="13">G981 约 13:31 到</text>
    </g>
