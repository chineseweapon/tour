      <text x="50" y="-13" fill="#16212f" font-weight="700">合肥南站</text>
      <text x="50" y="10" fill="#5d6b78" font-size="13">G87 约 10:54 到</text>
      <text x="50" y="30" fill="#5d6b78" font-size="13">G981 约 13:31 到</text>
