<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 560" role="img" aria-labelledby="title desc">
  <title id="title">Day 3 五大道和返程路线图</title>
  <desc id="desc">从酒店或天津站出发，游览民园广场、五大道，到桂园餐厅午餐，最后返回天津站。</desc>
  <rect width="390" height="560" fill="#fffaf2"/>
  <path d="M76 142 C164 180 90 258 172 300 S270 370 138 438" fill="none" stroke="#d7b77c" stroke-width="38" stroke-linecap="round" opacity=".55"/>
  <path d="M76 142 C164 180 90 258 172 300 S270 370 138 438" fill="none" stroke="#0e6b68" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 10"/>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">
    <text x="24" y="42" fill="#ad4d35" font-size="22" font-weight="700">Day 3 五大道慢走线</text>
    <text x="24" y="70" fill="#5d6b78" font-size="14">看洋楼、吃桂园，下午回天津站。</text>
  </g>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15">
    <g transform="translate(76 142)">
      <circle r="19" fill="#0e6b68"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">1</text>
      <rect x="34" y="-28" width="180" height="58" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-5" fill="#16212f" font-weight="700">酒店/天津站</text>
      <text x="50" y="18" fill="#5d6b78" font-size="13">退房或寄存</text>
    </g>
    <g transform="translate(142 218)">
      <circle r="19" fill="#ad4d35"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">2</text>
      <rect x="34" y="-28" width="180" height="58" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-5" fill="#16212f" font-weight="700">民园广场</text>
      <text x="50" y="18" fill="#5d6b78" font-size="13">五大道拍照起点</text>
    </g>
    <g transform="translate(116 292)">
      <circle r="19" fill="#c58b28"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">3</text>
      <rect x="34" y="-28" width="180" height="58" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-5" fill="#16212f" font-weight="700">五大道</text>
      <text x="50" y="18" fill="#5d6b78" font-size="13">赏花看建筑</text>
    </g>
    <g transform="translate(226 366)">
      <circle r="19" fill="#0e6b68"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">4</text>
      <rect x="-178" y="-28" width="154" height="58" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="-162" y="-5" fill="#16212f" font-weight="700">桂园餐厅</text>
      <text x="-162" y="18" fill="#5d6b78" font-size="13">八珍豆腐</text>
    </g>
    <g transform="translate(138 438)">
      <circle r="19" fill="#ad4d35"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">5</text>
      <rect x="34" y="-28" width="180" height="58" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-5" fill="#16212f" font-weight="700">天津站返程</text>
      <text x="50" y="18" fill="#5d6b78" font-size="13">提前取行李</text>
    </g>
  </g>
  <path d="M24 508 H366" stroke="#dfd6c6"/>
  <text x="24" y="536" fill="#5d6b78" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="13">建议：午餐后留足去车站和安检时间。</text>
</svg>
