<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 560" role="img" aria-labelledby="title desc">
  <title id="title">Day 3 市区到滨海航母乐园路线图</title>
  <desc id="desc">从市区酒店退房后亲友开车约七十公里到泰达航母主题公园，游玩一整天，晚上住滨海附近民宿。</desc>
  <rect width="390" height="560" fill="#fffaf2"/>
  <rect x="24" y="100" width="342" height="380" rx="26" fill="#eef5f3" stroke="#dfd6c6"/>
  <path d="M78 145 C170 188 102 268 194 330 S284 390 148 438" fill="none" stroke="#0e6b68" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 10"/>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">
    <text x="24" y="42" fill="#ad4d35" font-size="22" font-weight="700">Day 3 开车去滨海</text>
    <text x="24" y="70" fill="#5d6b78" font-size="14">退房后去航母乐园，晚上住滨海附近。</text>
  </g>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15">
    <g transform="translate(78 145)">
      <circle r="19" fill="#0e6b68"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">1</text>
      <rect x="34" y="-30" width="218" height="62" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-8" fill="#16212f" font-weight="700">市区酒店退房</text>
      <text x="50" y="15" fill="#5d6b78" font-size="13">行李放车上更省事</text>
    </g>
    <g transform="translate(160 230)">
      <circle r="19" fill="#ad4d35"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">2</text>
      <rect x="34" y="-30" width="176" height="62" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-8" fill="#16212f" font-weight="700">开车约 70km</text>
      <text x="50" y="15" fill="#5d6b78" font-size="13">去滨海新区</text>
    </g>
    <g transform="translate(194 330)">
      <circle r="19" fill="#c58b28"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">3</text>
      <rect x="34" y="-30" width="156" height="62" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-8" fill="#16212f" font-weight="700">泰达航母</text>
      <text x="50" y="15" fill="#5d6b78" font-size="13">游玩一整天</text>
    </g>
    <g transform="translate(148 438)">
      <circle r="19" fill="#ad4d35"/>
      <text x="-6" y="6" fill="#fff" font-weight="700">4</text>
      <rect x="34" y="-36" width="188" height="74" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="50" y="-13" fill="#16212f" font-weight="700">滨海民宿</text>
      <text x="50" y="10" fill="#5d6b78" font-size="13">节假日留意烟花秀</text>
      <text x="50" y="30" fill="#5d6b78" font-size="13">第二天去海博馆</text>
    </g>
  </g>
  <path d="M24 508 H366" stroke="#dfd6c6"/>
  <text x="24" y="536" fill="#5d6b78" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="13">核心：航母玩完不回市区，滨海住一晚。</text>
</svg>
