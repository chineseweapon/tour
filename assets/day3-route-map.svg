<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 560" role="img" aria-labelledby="title desc">
  <title id="title">Day 3 天津市区到滨海航母乐园地理示意线路图</title>
  <desc id="desc">北上南下的示意图：天津市区在西侧，滨海新区和泰达航母主题公园在东侧偏海边，亲友开车约七十公里后住滨海附近。</desc>
  <rect width="390" height="560" fill="#fffaf2"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ad4d35"/>
    </marker>
  </defs>
  <rect x="250" y="98" width="116" height="360" rx="24" fill="#d7e8ea" opacity=".68"/>
  <text x="292" y="486" fill="#5d6b78" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="13">渤海湾方向</text>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">
    <text x="24" y="42" fill="#ad4d35" font-size="22" font-weight="700">Day 3 市区向东去滨海</text>
    <text x="24" y="70" fill="#5d6b78" font-size="14">市区在西，航母乐园在滨海东侧，约 70km。</text>
    <g transform="translate(326 26)">
      <circle r="20" fill="#fff" stroke="#dfd6c6"/>
      <path d="M0 -13 L5 4 L0 1 L-5 4 Z" fill="#0e6b68"/>
      <text x="-5" y="-23" fill="#5d6b78" font-size="11">北</text>
    </g>
  </g>
  <path d="M78 178 C136 196 190 228 232 270 C258 298 282 324 304 360" fill="none" stroke="#ad4d35" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="14 10" marker-end="url(#arrow)"/>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15">
    <g transform="translate(78 178)">
      <circle r="18" fill="#0e6b68"/>
      <text x="-5" y="6" fill="#fff" font-weight="700">1</text>
      <rect x="30" y="-34" width="172" height="66" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="44" y="-11" fill="#16212f" font-weight="700">市区酒店退房</text>
      <text x="44" y="12" fill="#5d6b78" font-size="13">天津站/津湾一带</text>
    </g>
    <g transform="translate(192 248)">
      <rect x="-62" y="-22" width="124" height="44" rx="999" fill="#fff" stroke="#dfd6c6"/>
      <text x="-36" y="5" fill="#ad4d35" font-weight="700">约 70km</text>
    </g>
    <g transform="translate(286 332)">
      <circle r="18" fill="#ad4d35"/>
      <text x="-5" y="6" fill="#fff" font-weight="700">2</text>
      <rect x="-210" y="-34" width="180" height="66" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="-194" y="-11" fill="#16212f" font-weight="700">泰达航母乐园</text>
      <text x="-194" y="12" fill="#5d6b78" font-size="13">滨海东侧玩一天</text>
    </g>
    <g transform="translate(304 410)">
      <circle r="18" fill="#c58b28"/>
      <text x="-5" y="6" fill="#fff" font-weight="700">3</text>
      <rect x="-210" y="-34" width="180" height="66" rx="8" fill="#fff" stroke="#dfd6c6"/>
      <text x="-194" y="-11" fill="#16212f" font-weight="700">滨海附近民宿</text>
      <text x="-194" y="12" fill="#5d6b78" font-size="13">第二天去海博馆</text>
    </g>
  </g>
  <path d="M24 508 H366" stroke="#dfd6c6"/>
  <text x="24" y="536" fill="#5d6b78" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="13">示意重点：这天是市区向东进滨海，不再折返市区住宿。</text>
</svg>
